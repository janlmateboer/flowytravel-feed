name: Fetch TUI Feed

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run TUI pipeline
        env:
          TUI_FEED_URL: ${{ secrets.TUI_FEED_URL }}
        run: |
          python scripts/run_pipeline.py tui

      - name: Commit pipeline data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add snapshots/tui/latest/
          git add snapshots/tui/previous/
          git add snapshots/tui/archive/
          git add audits/tui/
          git add logs/tui/

          git commit -m "Update TUI pipeline data" || echo "No changes to commit"
          git push
