name: Fetch TUI Feed

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Fetch TUI snapshot
        env:
          TUI_FEED_URL: ${{ secrets.TUI_FEED_URL }}
        run: |
          python scripts/fetch_tui.py

      - name: Validate TUI snapshot
        run: |
          python scripts/validate_snapshot.py

      - name: Generate delta import
        run: |
          python scripts/generate_delta_import.py

      - name: Commit snapshot, delta and audit files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add snapshots/tui/latest/snapshot.json
          git add snapshots/tui/latest/snapshot_meta.json
          git add snapshots/tui/latest/snapshot_ids.json
          git add snapshots/tui/latest/changes_since_previous.json
          git add snapshots/tui/latest/delta_import.json

          git add audits/validation_report.json
          git add audits/duplicate_ids.json
          git add audits/missing_fields.json

          git commit -m "Update TUI snapshot, delta and audits" || echo "No changes to commit"
          git push
